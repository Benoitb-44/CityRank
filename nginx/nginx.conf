events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    sendfile      on;
    keepalive_timeout 65;
    resolver      127.0.0.11 valid=30s;

    # ── HTTP → HTTPS redirect (all vhosts) ──────────────────────────────────
    server {
        listen 80;
        server_name cityrank.fr www.cityrank.fr mcp-db.cityrank.fr;
        return 301 https://$host$request_uri;
    }

    # ── www.cityrank.fr → cityrank.fr ────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name www.cityrank.fr;

        ssl_certificate     /etc/letsencrypt/live/cityrank.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cityrank.fr/privkey.pem;

        return 301 https://cityrank.fr$request_uri;
    }

    # ── cityrank.fr → Next.js ────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name cityrank.fr;

        ssl_certificate     /etc/letsencrypt/live/cityrank.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cityrank.fr/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        location / {
            proxy_pass         http://cityrank:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── mcp-db.cityrank.fr → MCP PostgreSQL read-only ───────────────────────
    server {
        listen 443 ssl http2;
        server_name mcp-db.cityrank.fr;

        ssl_certificate     /etc/letsencrypt/live/mcp-db.cityrank.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mcp-db.cityrank.fr/privkey.pem;

        auth_basic           "MCP Postgres Read-Only";
        auth_basic_user_file /etc/nginx/.htpasswd-mcp-db;

        location / {
            proxy_pass         http://mcp-db:3002;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support (MCP transport)
            proxy_set_header          Connection '';
            proxy_buffering           off;
            proxy_cache               off;
            proxy_read_timeout        3600s;
            chunked_transfer_encoding on;
        }
    }
}
