# =====================================================================
# CityRank — MCP Database Proxy (lecture seule pour agents Claude Code)
# INFRA-08 / ADR-006
#
# Pré-requis :
#   1. Générer le htpasswd :
#        htpasswd -c /etc/nginx/.htpasswd-mcp-db claude_agent
#   2. Activer le server block :
#        ln -s /etc/nginx/sites-available/mcp-db.cityrank.fr.conf \
#              /etc/nginx/sites-enabled/
#   3. Obtenir le certificat SSL :
#        certbot --nginx -d mcp-db.cityrank.fr
# =====================================================================

server {
    listen 80;
    server_name mcp-db.cityrank.fr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp-db.cityrank.fr;

    ssl_certificate     /etc/letsencrypt/live/mcp-db.cityrank.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp-db.cityrank.fr/privkey.pem;

    # Accès restreint aux agents Claude Code autorisés
    auth_basic           "CityRank MCP DB — acces restreint";
    auth_basic_user_file /etc/nginx/.htpasswd-mcp-db;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE : désactiver le buffering pour le transport MCP
        proxy_set_header          Connection '';
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        600s;
        chunked_transfer_encoding on;
    }
}
