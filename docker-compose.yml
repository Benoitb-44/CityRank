services:
  immo-score:
    build: .
    container_name: immo-score
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - immo-network

networks:
  immo-network:
    driver: bridge
